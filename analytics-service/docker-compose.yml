version: "3.9"
services:
  analytics:
    build: .
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      LOG_LEVEL: "info"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  test:
    build: .
    command: ["python", "-m", "pytest", "tests/", "-v", "--tb=short"]
    volumes:
      - ./tests:/app/tests
    environment:
      PORT: "8000"
    profiles: ["test"]
