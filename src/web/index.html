<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Business IQ Enterprise</title>

    <!-- PWA -->
    <link rel="manifest" href="/public/manifest.json" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Business IQ" />
    <link rel="apple-touch-icon" href="/public/icons/apple-touch-icon.svg" />

    <!-- Favicon -->
    <link rel="icon" href="/public/icons/icon-192.svg" type="image/svg+xml" />

    <script>
      // Apply saved theme before render to prevent flash
      (function() {
        var t = localStorage.getItem('biq-theme');
        if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
